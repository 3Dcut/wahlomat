<!DOCTYPE html>
<html lang="de" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WahlEra</title>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]']
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ── DEV BLOCKER ────────────────────────────────────────────────── -->
  <div id="dev-blocker" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #080a0c; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 400px; padding: 2rem; background: rgba(15, 23, 36, 0.7); border: 1.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; box-shadow: 0 12px 32px rgba(0,0,0,0.4); backdrop-filter: blur(20px);">
      <h1 style="font-size: 2rem; margin-bottom: 1rem; color: #f8fafc; font-weight: 900;">Umbauarbeiten</h1>
      <p style="color: #94a3b8; margin-bottom: 2rem;">Neue Wahlen, neue Fragen.<br>Diese Seite ist vorübergehend blockiert.</p>
      <input type="password" id="dev-password" placeholder="Code eingeben" style="padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.3); color: #fff; width: 100%; text-align: center; font-size: 1.2rem; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'" />
    </div>
    <script>
      document.getElementById('dev-password').addEventListener('input', function(e) {
        if (e.target.value === '555') {
          document.getElementById('dev-blocker').style.display = 'none';
        }
      });
    </script>
  </div>
  <!-- ── Navigation ────────────────────────────────────────────────── -->
  <nav class="wom-nav">
    <div class="wom-nav-inner">
      <a href="#start" class="wom-nav-title meta-title">🗳 WahlEra</a>
      <div class="wom-nav-actions" style="display:flex; align-items:center;">
        <label style="display:flex; align-items:center; gap:0.4rem; font-size:0.75rem; cursor:pointer; color:var(--text-muted); margin-right: 0.5rem;" title="Spaßfrage (Spionage) in der Wertung berücksichtigen">
          <input type="checkbox" id="toggle-spionage" checked style="accent-color:var(--accent); cursor:pointer;">
          <span class="hidden sm:inline" style="white-space:nowrap;">Spionage werten</span>
          <span class="sm:hidden" style="white-space:nowrap;">Spion</span>
        </label>
        <button id="btn-show-overview" class="btn btn-ghost" style="font-size:0.82rem;padding:0.4rem 0.75rem">
          Alle Antworten
        </button>
        <button id="btn-dark-toggle" class="btn-icon" title="Dark Mode umschalten">🌙</button>
      </div>
    </div>
  </nav>

  <!-- ── Screen: Start ─────────────────────────────────────────────── -->
  <section id="screen-start" class="screen hidden">
    <div class="screen-inner">

      <!-- Resume banner (filled by app.js if localStorage data exists) -->
      <div id="resume-banner" class="hidden" style="margin-bottom:2rem"></div>

      <!-- Hero -->
      <div class="card slide-in-up" style="padding:4rem 2rem;text-align:center;margin-bottom:2.5rem;background:rgba(255,255,255,0.02)">
        <span class="hero-emoji" style="font-size:5rem;margin-bottom:1.5rem;display:block">🗳️</span>
        <h1 style="font-size:3rem;font-weight:900;color:var(--text);letter-spacing:-0.05em;margin:0.5rem 0"
            class="meta-title">WahlEra</h1>
        <p style="font-size:1.1rem;font-weight:700;color:var(--accent-2);margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.1em"
           class="meta-election"></p>
        <p style="font-size:1rem;color:var(--text-muted);max-width:28rem;margin:0 auto;line-height:1.6"
           class="meta-description"></p>
      </div>

      <!-- CTA -->
      <div class="slide-in-up" style="display:flex;flex-direction:column;gap:1.1rem;align-items:center;animation-delay:0.1s">
        <button id="btn-start" class="btn btn-primary" style="font-size:1.2rem;padding:1rem 3.5rem">
          WahlEra starten
        </button>
        <button id="btn-show-overview-2" class="btn btn-ghost"
                onclick="document.getElementById('btn-show-overview').click()">
          Alle Antworten ansehen
        </button>
      </div>

      <p style="margin-top:3.5rem;font-size:0.85rem;color:var(--text-light);text-align:center;line-height:1.8;opacity:0.6">
        Beantworte Fragen zwischen zwei Positionen auf einer Skala von 1–5.<br>
        Fragen können doppelt gewichtet oder übersprungen werden.
      </p>
    </div>
  </section>

  <!-- ── Screen: Quiz ───────────────────────────────────────────────── -->
  <section id="screen-quiz" class="screen hidden">
    <!-- Content rendered by app.js -->
  </section>

  <!-- ── Screen: Results ───────────────────────────────────────────── -->
  <section id="screen-results" class="screen hidden">
    <!-- Content rendered by app.js -->
  </section>

  <!-- ── Screen: Compare ───────────────────────────────────────────── -->
  <section id="screen-compare" class="screen hidden">
    <!-- Content rendered by app.js -->
  </section>
  
  <!-- ── Screen: Profile ───────────────────────────────────────────── -->
  <section id="screen-profile" class="screen hidden">
    <!-- Content rendered by app.js -->
  </section>

  <!-- ── Screen: Overview ──────────────────────────────────────────── -->
  <section id="screen-overview" class="screen hidden">
    <!-- Content rendered by app.js -->
  </section>

  <!-- ── Toast container ───────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="data.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
